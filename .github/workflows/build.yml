name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: npx electron-packager . GioBrowser --platform=win32 --arch=x64

      - uses: actions/upload-artifact@v4
        with:
          name: Gio-EXE
          path: GioBrowser-win32-x64
